services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_VERSION: ${APP_VERSION}
      DATABASE_URL: ${DATABASE_URL}
      CHOKIDAR_USEPOLLING: "true"
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "pnpm --filter @juscash/shared build &&
      pnpm --filter @juscash/backend prisma:generate &&
      pnpm --filter @juscash/backend dev"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./apps/backend/test:/app/apps/backend/test
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json
      - ./apps/backend/tsconfig.build.json:/app/apps/backend/tsconfig.build.json
      - ./apps/backend/nest-cli.json:/app/apps/backend/nest-cli.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./packages/shared/tsconfig.build.json:/app/packages/shared/tsconfig.build.json

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    command: >
      sh -c "pnpm --filter @juscash/shared build &&
      pnpm --filter @juscash/frontend dev --hostname 0.0.0.0"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/tsconfig.json:/app/apps/frontend/tsconfig.json
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/shared/tsconfig.json:/app/packages/shared/tsconfig.json
      - ./packages/shared/tsconfig.build.json:/app/packages/shared/tsconfig.build.json

volumes:
  postgres_data:
